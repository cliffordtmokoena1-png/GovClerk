<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a3a5c"/>

  <!-- Server rack silhouettes (background) -->
  <rect x="10" y="60" width="30" height="180" rx="3" fill="#0f2540" stroke="#7cb3e8" stroke-width="0.5"/>
  <rect x="15" y="70" width="20" height="4" rx="1" fill="#7cb3e8" opacity="0.5"/>
  <rect x="15" y="80" width="20" height="4" rx="1" fill="#7cb3e8" opacity="0.5"/>
  <rect x="15" y="90" width="20" height="4" rx="1" fill="#7cb3e8" opacity="0.5"/>
  <rect x="15" y="100" width="20" height="4" rx="1" fill="#7cb3e8" opacity="0.3"/>
  <rect x="15" y="110" width="20" height="4" rx="1" fill="#7cb3e8" opacity="0.3"/>
  <rect x="360" y="60" width="30" height="180" rx="3" fill="#0f2540" stroke="#7cb3e8" stroke-width="0.5"/>
  <rect x="365" y="70" width="20" height="4" rx="1" fill="#7cb3e8" opacity="0.5"/>
  <rect x="365" y="80" width="20" height="4" rx="1" fill="#7cb3e8" opacity="0.5"/>
  <rect x="365" y="90" width="20" height="4" rx="1" fill="#7cb3e8" opacity="0.3"/>

  <!-- Conference table -->
  <ellipse cx="200" cy="210" rx="130" ry="28" fill="#0f2540" stroke="#7cb3e8" stroke-width="1"/>
  <rect x="70" y="205" width="260" height="12" rx="2" fill="#122d4e" stroke="#7cb3e8" stroke-width="0.8"/>

  <!-- Holographic projector glow -->
  <ellipse cx="200" cy="190" rx="25" ry="8" fill="#7cb3e8" opacity="0.2"/>
  <polygon points="185,190 215,190 205,155 195,155" fill="#7cb3e8" opacity="0.15"/>
  <ellipse cx="200" cy="153" rx="18" ry="6" fill="#7cb3e8" opacity="0.25"/>
  <rect x="192" y="183" width="16" height="10" rx="2" fill="#7cb3e8" opacity="0.6"/>

  <!-- Robot 1 (left, writing in notebook) -->
  <!-- Body -->
  <rect x="105" y="155" width="36" height="44" rx="5" fill="#2a5a8c" stroke="#7cb3e8" stroke-width="1"/>
  <!-- Head -->
  <rect x="110" y="130" width="26" height="22" rx="4" fill="#2a5a8c" stroke="#7cb3e8" stroke-width="1"/>
  <!-- Eyes -->
  <rect x="115" y="135" width="6" height="4" rx="1" fill="#7cb3e8"/>
  <rect x="125" y="135" width="6" height="4" rx="1" fill="#7cb3e8"/>
  <!-- Mouth -->
  <rect x="116" y="143" width="12" height="2" rx="1" fill="#7cb3e8" opacity="0.6"/>
  <!-- Arm writing -->
  <line x1="141" y1="175" x2="165" y2="185" stroke="#2a5a8c" stroke-width="6" stroke-linecap="round"/>
  <!-- Notebook -->
  <rect x="152" y="180" width="30" height="22" rx="2" fill="white" opacity="0.9"/>
  <line x1="157" y1="186" x2="178" y2="186" stroke="#1a3a5c" stroke-width="1" opacity="0.5"/>
  <line x1="157" y1="190" x2="178" y2="190" stroke="#1a3a5c" stroke-width="1" opacity="0.5"/>
  <line x1="157" y1="194" x2="172" y2="194" stroke="#1a3a5c" stroke-width="1" opacity="0.5"/>

  <!-- Robot 2 (right, near projector) -->
  <!-- Body -->
  <rect x="258" y="158" width="34" height="42" rx="5" fill="#2a5a8c" stroke="#7cb3e8" stroke-width="1"/>
  <!-- Head -->
  <rect x="263" y="134" width="24" height="21" rx="4" fill="#2a5a8c" stroke="#7cb3e8" stroke-width="1"/>
  <!-- Eyes -->
  <rect x="267" y="139" width="5" height="4" rx="1" fill="#7cb3e8"/>
  <rect x="276" y="139" width="5" height="4" rx="1" fill="#7cb3e8"/>

  <!-- Foreground robot (laptop) -->
  <!-- Body -->
  <rect x="170" y="215" width="60" height="50" rx="6" fill="#1e4a7a" stroke="#7cb3e8" stroke-width="1.2"/>
  <!-- Head -->
  <rect x="178" y="188" width="44" height="24" rx="5" fill="#1e4a7a" stroke="#7cb3e8" stroke-width="1.2"/>
  <!-- Eyes (larger, foreground) -->
  <rect x="183" y="193" width="8" height="6" rx="2" fill="#7cb3e8"/>
  <rect x="199" y="193" width="8" height="6" rx="2" fill="#7cb3e8"/>
  <!-- Laptop -->
  <rect x="155" y="255" width="90" height="10" rx="2" fill="#0f2540" stroke="#7cb3e8" stroke-width="0.8"/>
  <rect x="160" y="240" width="80" height="18" rx="2" fill="#0d1e35" stroke="#7cb3e8" stroke-width="0.8"/>
  <rect x="164" y="243" width="72" height="12" rx="1" fill="#122d4e" opacity="0.8"/>

  <!-- GovClerk G logo -->
  <circle cx="200" cy="50" r="22" fill="none" stroke="white" stroke-width="2.5"/>
  <path d="M215,42 A18,18 0 1,0 215,58 L207,58 L207,50 L215,50" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Labels -->
  <text x="200" y="22" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">GovClerk Robot Meeting</text>
  <text x="200" y="284" text-anchor="middle" fill="#7cb3e8" font-size="11" font-family="sans-serif">Steps 0 &amp; 3 — Replace with step-robot-meeting.png</text>
</svg>
