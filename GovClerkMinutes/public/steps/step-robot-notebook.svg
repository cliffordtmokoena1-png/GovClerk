<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a3a5c"/>

  <!-- Futuristic control panel background -->
  <rect x="0" y="180" width="400" height="120" fill="#0f2540"/>
  <rect x="0" y="176" width="400" height="6" fill="#7cb3e8" opacity="0.3"/>

  <!-- Control panel details -->
  <rect x="20" y="200" width="50" height="30" rx="3" fill="#122d4e" stroke="#7cb3e8" stroke-width="0.8"/>
  <rect x="25" y="205" width="40" height="4" rx="1" fill="#7cb3e8" opacity="0.5"/>
  <rect x="25" y="213" width="30" height="4" rx="1" fill="#7cb3e8" opacity="0.3"/>
  <rect x="25" y="221" width="35" height="4" rx="1" fill="#7cb3e8" opacity="0.4"/>
  <rect x="330" y="200" width="50" height="30" rx="3" fill="#122d4e" stroke="#7cb3e8" stroke-width="0.8"/>
  <rect x="335" y="205" width="40" height="4" rx="1" fill="#7cb3e8" opacity="0.5"/>
  <rect x="335" y="213" width="28" height="4" rx="1" fill="#7cb3e8" opacity="0.3"/>
  <circle cx="100" cy="240" r="10" fill="#0f2540" stroke="#7cb3e8" stroke-width="1"/>
  <circle cx="100" cy="240" r="5" fill="#7cb3e8" opacity="0.5"/>
  <circle cx="300" cy="240" r="10" fill="#0f2540" stroke="#7cb3e8" stroke-width="1"/>
  <circle cx="300" cy="240" r="5" fill="#7cb3e8" opacity="0.5"/>
  <rect x="120" y="235" width="160" height="10" rx="2" fill="#122d4e" stroke="#7cb3e8" stroke-width="0.7"/>
  <rect x="130" y="237" width="30" height="6" rx="1" fill="#7cb3e8" opacity="0.4"/>
  <rect x="170" y="237" width="50" height="6" rx="1" fill="#7cb3e8" opacity="0.25"/>
  <rect x="230" y="237" width="20" height="6" rx="1" fill="#7cb3e8" opacity="0.4"/>

  <!-- Notebook (open, prominent) -->
  <rect x="90" y="90" width="220" height="160" rx="6" fill="white" opacity="0.95"/>
  <!-- Spiral binding -->
  <rect x="90" y="90" width="12" height="160" rx="3" fill="#e0e0e0"/>
  <circle cx="96" cy="108" r="4" fill="#aaa"/>
  <circle cx="96" cy="126" r="4" fill="#aaa"/>
  <circle cx="96" cy="144" r="4" fill="#aaa"/>
  <circle cx="96" cy="162" r="4" fill="#aaa"/>
  <circle cx="96" cy="180" r="4" fill="#aaa"/>
  <circle cx="96" cy="198" r="4" fill="#aaa"/>
  <circle cx="96" cy="216" r="4" fill="#aaa"/>
  <circle cx="96" cy="234" r="4" fill="#aaa"/>

  <!-- "PROJECT ALPHA" label at top of notebook -->
  <rect x="110" y="96" width="192" height="16" rx="2" fill="#1a3a5c"/>
  <text x="206" y="108" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif" font-weight="bold" letter-spacing="2">PROJECT ALPHA</text>

  <!-- GovClerk G logo on notebook (prominent) -->
  <circle cx="206" cy="158" r="28" fill="none" stroke="#1a3a5c" stroke-width="3"/>
  <path d="M224,146 A22,22 0 1,0 224,170 L215,170 L215,158 L224,158" fill="none" stroke="#1a3a5c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Notes/equations around the G -->
  <line x1="118" y1="122" x2="170" y2="122" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>
  <line x1="118" y1="132" x2="158" y2="132" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>
  <line x1="118" y1="142" x2="165" y2="142" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>
  <line x1="242" y1="122" x2="294" y2="122" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>
  <line x1="255" y1="132" x2="294" y2="132" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>
  <line x1="248" y1="142" x2="294" y2="142" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>
  <line x1="118" y1="196" x2="294" y2="196" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>
  <line x1="118" y1="208" x2="280" y2="208" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>
  <line x1="118" y1="220" x2="260" y2="220" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>
  <line x1="118" y1="232" x2="294" y2="232" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>
  <line x1="118" y1="244" x2="240" y2="244" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>

  <!-- Metallic robot hand (right side) -->
  <!-- Forearm -->
  <rect x="290" y="130" width="60" height="80" rx="12" fill="#3a7ab8" stroke="#7cb3e8" stroke-width="1.5"/>
  <!-- Knuckle details -->
  <rect x="295" y="135" width="50" height="8" rx="3" fill="#2a5a8c" stroke="#7cb3e8" stroke-width="0.8"/>
  <!-- Fingers -->
  <rect x="295" y="145" width="12" height="40" rx="5" fill="#3a7ab8" stroke="#7cb3e8" stroke-width="1"/>
  <rect x="312" y="140" width="12" height="45" rx="5" fill="#3a7ab8" stroke="#7cb3e8" stroke-width="1"/>
  <rect x="329" y="143" width="12" height="42" rx="5" fill="#3a7ab8" stroke="#7cb3e8" stroke-width="1"/>
  <rect x="346" y="148" width="10" height="35" rx="5" fill="#3a7ab8" stroke="#7cb3e8" stroke-width="1"/>
  <!-- Pen -->
  <rect x="316" y="180" width="4" height="30" rx="1" fill="white" opacity="0.9"/>
  <polygon points="316,210 320,210 318,220" fill="#7cb3e8"/>

  <!-- Labels -->
  <text x="200" y="22" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">GovClerk Robot Notebook</text>
  <text x="200" y="284" text-anchor="middle" fill="#7cb3e8" font-size="11" font-family="sans-serif">Steps 2 &amp; 4 — Replace with step-robot-notebook.png</text>
</svg>
